<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Payment Failed</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        }
        .loader {
            text-align: center;
            color: white;
        }
        .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 20px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h2 {
            font-size: 24px;
            margin: 10px 0;
        }
        p {
            font-size: 16px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <h2>✕ Failed</h2>
        <h2>נכשל ✕</h2>
        <p>Redirecting...</p>
        <p>מעביר...</p>
    </div>
    
    <script>
        // Extract error parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const errorCode = urlParams.get('code') || urlParams.get('Response') || '';
        const errorMessage = urlParams.get('error') || urlParams.get('ResponseText') || '';
        
        // Build redirect URL with error params
        let redirectUrl = window.location.origin + '/payment-failure';
        if (errorCode || errorMessage) {
            const params = new URLSearchParams();
            if (errorCode) params.set('code', errorCode);
            if (errorMessage) params.set('error', errorMessage);
            redirectUrl += '?' + params.toString();
        }
        
        // Break out of iframe and redirect parent window
        if (window.parent && window.parent !== window) {
            // We're inside an iframe
            window.parent.location.href = redirectUrl;
        } else {
            // Direct navigation (shouldn't happen, but just in case)
            window.location.href = redirectUrl;
        }
    </script>
</body>
</html>
